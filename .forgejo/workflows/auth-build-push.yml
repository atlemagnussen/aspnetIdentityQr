name: AspAuth Build and Push
on:
  push:
    branches:
      - main
    tags:
      - '*'

jobs:
  build-and-push:
    runs-on: docker
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Set version
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/* ]]; then
            VERSION="${GITHUB_REF#refs/tags/}"
          else
            VERSION="dev-${GITHUB_SHA::7}"
          fi
          echo "VERSION=$VERSION" >> $GITHUB_ENV
      
      - name: Log in to Registry
        run: |
          echo "${{ secrets.REGISTRY_PASSWORD }}" | docker login dev.logout.work -u "${{ secrets.REGISTRY_USERNAME }}" --password-stdin
      - name: Build
        run: docker build -f AspAuth.Local/Containerfile -t dev.logout.work/empire/aspauth:${{ env.VERSION }}  -t dev.logout.work/empire/aspauth:latest .
      - name: Push
        run: |
          docker push dev.logout.work/empire/aspauth:${{ env.VERSION }} 
          docker push dev.logout.work/empire/aspauth:latest