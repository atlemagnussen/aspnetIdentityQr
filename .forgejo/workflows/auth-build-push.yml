name: AspAuth Build and Push
on:
  push:
    branches:
      - main
    tags:
      - '*'

jobs:
  build-and-push:
    runs-on: docker
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - name: GitVersion
        image: mcr.microsoft.com/dotnet/sdk:10.0
        run: |
          dotnet tool install --global GitVersion.Tool
          export PATH="$PATH:/root/.dotnet/tools"
          dotnet-gitversion /output buildserver
          
          VERSION=$(dotnet-gitversion /showvariable FullSemVer)
      
      - name: Log in to Registry
        run: |
          echo "${{ secrets.REGISTRY_PASSWORD }}" | docker login dev.logout.work -u "${{ secrets.REGISTRY_USERNAME }}" --password-stdin
      - name: Build
        run: docker build -f AspAuth.Local/Containerfile -t dev.logout.work/empire/aspauth:${{ env.PACKAGE_VERSION }} -t dev.logout.work/empire/aspauth:latest .
      - name: Push
        run: |
          docker push dev.logout.work/empire/aspauth:${{ env.PACKAGE_VERSION }}
          docker push dev.logout.work/empire/aspauth:latest