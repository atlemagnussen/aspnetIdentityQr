name: AspAuth Build and Push
on:
  push:
    branches:
      - main
    tags:
      - '*'

jobs:
  build-and-push:
    runs-on: docker
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - name: Install GitVersion
        uses: gittools/actions/gitversion/setup@v4.4.2
        with:
          versionSpec: '6.6.x'

      - name: Determine Version
        id: version_step # step id used as a reference for output values
        uses: gittools/actions/gitversion/execute@v4.4.2
      
      - name: Log in to Registry
        run: |
          echo "${{ secrets.REGISTRY_PASSWORD }}" | docker login dev.logout.work -u "${{ secrets.REGISTRY_USERNAME }}" --password-stdin
      - name: Build
        run: docker build -f AspAuth.Local/Containerfile -t dev.logout.work/empire/aspauth:${{ env.fullSemVer }} -t dev.logout.work/empire/aspauth:latest .
      - name: Push
        run: |
          docker push dev.logout.work/empire/aspauth:${{ env.fullSemVer }}
          docker push dev.logout.work/empire/aspauth:latest